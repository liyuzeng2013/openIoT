<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenIoT 智能家居平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 登录页面 -->
        <div id="login-page" class="page active">
            <div class="login-container">
                <div class="login-header">
                    <h1>🏠 OpenIoT</h1>
                    <p>智能家居控制平台</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">登录</button>
                        <button type="button" id="register-btn" class="btn btn-secondary">注册</button>
                    </div>
                    <div id="login-message" class="message"></div>
                </form>
            </div>
        </div>

        <!-- 主控制台 -->
        <div id="dashboard-page" class="page">
            <!-- 顶部导航 -->
            <header class="header">
                <div class="header-left">
                    <h2>OpenIoT 控制台</h2>
                </div>
                <div class="header-right">
                    <span id="user-info">欢迎, <span id="current-user"></span></span>
                    <button id="logout-btn" class="btn btn-small">退出</button>
                </div>
            </header>

            <!-- 主内容区 -->
            <div class="main-content">
                <!-- 左侧设备列表 -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h3>我的设备</h3>
                        <button id="add-device-btn" class="btn btn-small btn-primary">+ 添加</button>
                    </div>
                    <div id="device-list" class="device-list">
                        <!-- 设备卡片将通过 JS 动态生成 -->
                    </div>
                </aside>

                <!-- 右侧控制面板 -->
                <main class="control-panel">
                    <div id="no-device-selected" class="empty-state">
                        <p>请选择一个设备或添加新设备</p>
                    </div>
                    <div id="device-control" class="device-control hidden">
                        <div class="control-header">
                            <h3 id="device-name">设备名称</h3>
                            <span id="device-status" class="status-badge">离线</span>
                        </div>
                        <div class="control-content">
                            <div class="device-info">
                                <p><strong>设备ID:</strong> <span id="device-id"></span></p>
                                <p><strong>类型:</strong> <span id="device-type"></span></p>
                                <p><strong>协议:</strong> <span id="device-protocol"></span></p>
                            </div>
                            <div class="device-controls">
                                <!-- 根据设备类型动态生成控制 -->
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <!-- 添加设备弹窗 -->
        <div id="add-device-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>添加设备</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <form id="add-device-form">
                    <div class="form-group">
                        <label for="device-name-input">设备名称</label>
                        <input type="text" id="device-name-input" placeholder="例如：客厅灯" required>
                    </div>
                    <div class="form-group">
                        <label for="device-type-select">设备类型</label>
                        <select id="device-type-select">
                            <option value="Light">灯</option>
                            <option value="Switch">开关</option>
                            <option value="Sensor">传感器</option>
                            <option value="Plug">插座</option>
                            <option value="Thermostat">温控器</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="protocol-select">通信协议</label>
                        <select id="protocol-select">
                            <option value="BluetoothMesh1">蓝牙 Mesh 1.0</option>
                            <option value="BluetoothMesh2">蓝牙 Mesh 2.0</option>
                            <option value="Custom2G4">自研 2.4G</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">添加</button>
                        <button type="button" class="btn btn-secondary modal-close">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
